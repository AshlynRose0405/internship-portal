<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment – Internship Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e8f0fe 0%, #d0e8ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background: #fff;
            padding: 14px 40px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header img { height: 48px; }

        .header-user {
            font-size: 16px;
            font-weight: 600;
            color: #1a3a6b;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 48px 20px;
        }

        .card {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(68,156,228,.15);
            padding: 48px 40px;
            text-align: center;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #43a047, #66bb6a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
            color: #fff;
            box-shadow: 0 4px 16px rgba(67,160,71,.3);
        }

        h1 {
            font-size: 26px;
            color: #1a3a6b;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 36px;
            line-height: 1.6;
        }

        .info-box {
            background: #f0f7ff;
            border: 1.5px solid #c8deff;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 32px;
            text-align: left;
        }

        .info-box p {
            font-size: 15px;
            color: #444;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-box p:last-child { margin-bottom: 0; }

        .info-box i { color: #449ce4; width: 18px; }

        .coming-soon {
            display: inline-block;
            background: linear-gradient(to right, #1a56db, #449ce4);
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            padding: 16px 40px;
            border-radius: 12px;
            border: none;
            cursor: default;
            box-shadow: 0 4px 14px rgba(68,156,228,.35);
            letter-spacing: .3px;
            margin-bottom: 20px;
            width: 100%;
        }

        .logout-link {
            display: inline-block;
            margin-top: 8px;
            font-size: 15px;
            color: #449ce4;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
        }

        .logout-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <header>
        <img src="images/logo.png" alt="Logo">
        <span class="header-user" id="headerUser"></span>
    </header>

    <div class="container">
        <div class="card">

            <div class="success-icon">
                <i class="fa-solid fa-check"></i>
            </div>

            <h1>Application Submitted!</h1>
            <p class="subtitle">
                Your internship application has been received successfully.<br>
                Complete the payment below to confirm your enrollment.
            </p>

            <div class="info-box">
                <p><i class="fa-solid fa-user"></i> <span id="payUserId">Loading...</span></p>
                <p><i class="fa-solid fa-indian-rupee-sign"></i> Application Fee: <strong>&#8377; 500</strong></p>
                <p><i class="fa-solid fa-circle-info"></i> Payment gateway integration coming soon</p>
            </div>

            <div class="coming-soon">
                <i class="fa-solid fa-lock"></i>&nbsp; Secure Payment — Coming Soon
            </div>

            <a class="logout-link" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>

        </div>
    </div>

    <script>
        const userId = localStorage.getItem("userId");
        if (!userId) {
            window.location.href = "login.html";
        } else {
            document.getElementById("headerUser").textContent = "User: " + userId;
            document.getElementById("payUserId").innerHTML =
                "<strong>User ID:</strong> " + userId;
        }

        function logout() {
            if (confirm("Are you sure you want to logout?")) {
                localStorage.clear();
                window.location.href = "login.html";
            }
        }
    </script>

</body>
</html>
